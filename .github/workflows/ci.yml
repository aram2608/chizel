name: CI

on:
  push:
    branches:
        - main
    pull_request:
        - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Zig
        use: mlugg/setup-zig@v2
        with:
          version: 0.15.0

      - name: Run Tests
        run: zig build test
